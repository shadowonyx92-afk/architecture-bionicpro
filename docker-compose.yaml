services:
  keycloak_db:
    image: postgres:14
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - ./postgres-keycloak-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  crm-db:
    image: postgres:14
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=4
      - -c
      - max_replication_slots=4
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - crm-db-data:/var/lib/postgresql/data
      - ./crm/init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    depends_on:
      - kafka
      - crm-db
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: bionicpro-connect
      CONFIG_STORAGE_TOPIC: bionicpro_connect_configs
      OFFSET_STORAGE_TOPIC: bionicpro_connect_offsets
      STATUS_STORAGE_TOPIC: bionicpro_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"

  openldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: BionicPRO
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: admin
    command: --copy-service
    volumes:
      - ./ldap/config.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/config.ldif
    ports:
      - "389:389"

  keycloak:
    image: quay.io/keycloak/keycloak:21.1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-replace-with-yandex-client-id}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-replace-with-yandex-client-secret}
    command: 
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8003:8080"
    depends_on:
      - keycloak_db
      - openldap

  bionicpro-auth:
    build:
      context: ./bionicpro-auth
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      FRONTEND_URL: http://127.0.0.1:8002
      KEYCLOAK_BROWSER_URL: http://127.0.0.1:8003
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: reports-realm
      KEYCLOAK_CLIENT_ID: bionicpro-auth
      KEYCLOAK_CLIENT_SECRET: bionicpro-auth-secret
      AUTH_CALLBACK_URL: http://127.0.0.1:8000/auth/callback
      AUTH_COOKIE_SECURE: "false"
      INTERNAL_AUTH_SECRET: local-internal-secret
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: bionicpro
    depends_on:
      - keycloak
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    depends_on:
      - kafka

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nginx-cdn:
    image: nginx:1.27-alpine
    ports:
      - "8082:8082"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cache:/var/cache/nginx
    depends_on:
      - minio

  airflow:
    image: apache/airflow:2.9.3
    command: standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_HOME: /opt/airflow
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    depends_on:
      - clickhouse

  reports-api:
    build:
      context: ./reports-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      FRONTEND_URL: http://127.0.0.1:8002
      AUTH_URL: http://bionicpro-auth:8000
      INTERNAL_AUTH_SECRET: local-internal-secret
      AUTH_COOKIE_SECURE: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: bionicpro
      REPORTS_TABLE: report_mart_cdc
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: bionicpro-reports
      S3_REGION: us-east-1
      CDN_BASE_URL: http://localhost:8082/reports
    depends_on:
      - bionicpro-auth
      - clickhouse
      - minio
      - nginx-cdn

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8002:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8001
      REACT_APP_AUTH_URL: http://localhost:8000
    depends_on:
      - bionicpro-auth
      - reports-api

volumes:
  crm-db-data:
  minio-data:
